name: Provision Repository

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository to provision (owner/repo)"
        required: true
        type: string

jobs:
  provision:
    name: "Provision ${{ inputs.target_repo }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast with a clear message if either secret is not configured.
      # GitHub passes empty string for unset secrets — this catches that.
      - name: Preflight — verify secrets are set
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          GH_PROVISIONER_PAT: ${{ secrets.GH_PROVISIONER_PAT }}
        run: |
          missing=()
          [[ -z "$BWS_ACCESS_TOKEN" ]]   && missing+=("BWS_ACCESS_TOKEN")
          [[ -z "$GH_PROVISIONER_PAT" ]] && missing+=("GH_PROVISIONER_PAT")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::The following secrets are not set on this repository: ${missing[*]}"
            echo "Go to Settings → Secrets and variables → Actions and add them."
            exit 1
          fi
          echo "Preflight passed — both secrets are present."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r custom-tooling/bws_secret_injector/requirements.txt

      # Copy BWS_ACCESS_TOKEN from this repo's secrets into the target repo
      # under the same name, encrypted with the target repo's NaCl public key.
      - name: Copy BWS_ACCESS_TOKEN to target repo
        env:
          GH_PAT: ${{ secrets.GH_PROVISIONER_PAT }}
          TARGET_REPO: ${{ inputs.target_repo }}
          SECRET_NAME: "BWS_ACCESS_TOKEN"
          SECRET_VALUE: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: python custom-tooling/bws_secret_injector/inject_secret.py

      - name: Summary
        if: success()
        run: |
          echo "### Provisioning complete :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Target repo | \`${{ inputs.target_repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret copied | \`BWS_ACCESS_TOKEN\` |" >> $GITHUB_STEP_SUMMARY