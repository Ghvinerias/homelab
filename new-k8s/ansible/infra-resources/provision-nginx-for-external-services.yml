---
- name: Deploy Production HA External Ingress + Jellyfin Example (HTTPS)
  hosts: localhost
  gather_facts: false
  connection: local
  become: false

  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
    kube_context: ""
    ingress_name: "ingress-nginx-external"
    ingress_namespace: "ingress-nginx-external"

  tasks:

    ###########################################################################
    # Helm Repository
    ###########################################################################

    - name: Ensure ingress-nginx Helm repo exists
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx

    ###########################################################################
    # HA External Ingress Controller
    ###########################################################################

    - name: Deploy HA external ingress controller
      kubernetes.core.helm:
        name: "{{ ingress_name }}"
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: "{{ ingress_namespace }}"
        create_namespace: true
        atomic: true
        wait: true
        update_repo_cache: true
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        values:
          controller:
            replicaCount: 2
            allowSnippetAnnotations: true
            service:
              type: LoadBalancer
              externalTrafficPolicy: Local
            ingressClass: "nginx-external"
            ingressClassResource:
              name: "nginx-external"
              enabled: true
              default: false
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - ingress-nginx
                    topologyKey: "kubernetes.io/hostname"
            tolerations:
              - key: "node-role.kubernetes.io/control-plane"
                operator: "Exists"
                effect: "NoSchedule"
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"

            ###################################################################
            # NGINX Global Configuration
            ###################################################################

            config:
              allow-snippet-annotations: "true"
              annotations-risk-level: "Critical"
              ssl-protocols: "TLSv1.2 TLSv1.3"
              ssl-ciphers: "ECDHE-ECDSA-CAMELLIA256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CAMELLIA256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-CAMELLIA128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CAMELLIA128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-ECDSA-CAMELLIA256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-CAMELLIA256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-ECDSA-CAMELLIA128-SHA256:ECDHE-RSA-AES128-SHA256"
              ssl-session-timeout: "1d"
              ssl-session-cache: "shared:SSL:50m"
              ssl-session-tickets: "false"
              ssl-prefer-server-ciphers: "off"
              ssl-stapling: "false"
              use-forwarded-headers: "true"
              compute-full-forwarded-for: "true"
              enable-real-ip: "true"
              real-ip-header: "X-Real-IP"

              #################################################################
              # OpenTelemetry
              #################################################################
              enable-opentelemetry: "true"
              opentelemetry-collector-host: "otel-collector.monitoring.svc.cluster.local"
              opentelemetry-collector-port: "4317"
              opentelemetry-operation-name: "HTTP $request_method $uri"
              opentelemetry-trust-incoming-span: "true"

    ###########################################################################
    # Namespace for External Services
    ###########################################################################

    - name: Create namespace for external ingress services
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ ingress_namespace }}"

    ###########################################################################
    # Jellyfin External Service + Endpoints
    ###########################################################################

    - name: Deploy Jellyfin external Service
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: jellyfin-external
            namespace: "{{ ingress_namespace }}"
          spec:
            ports:
              - port: 80
                targetPort: 8096

    - name: Deploy Jellyfin external Endpoints
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:

          apiVersion: v1
          kind: Endpoints
          metadata:
            name: jellyfin-external
            namespace: "{{ ingress_namespace }}"
          subsets:
            - addresses:
                - ip: 10.10.10.13
              ports:
                - port: 8096

    ###########################################################################
    # Jellyfin Ingress (HTTPS + HTTP → HTTPS)
    ###########################################################################

    - name: Deploy Jellyfin ingress
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:

          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: jellyfin
            namespace: "{{ ingress_namespace }}"
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/proxy-body-size: "20m"
              nginx.ingress.kubernetes.io/proxy-request-buffering: "on"
              nginx.ingress.kubernetes.io/proxy-max-temp-file-size: "1024m"
              nginx.ingress.kubernetes.io/proxy-hide-headers: "X-Powered-By"
              nginx.ingress.kubernetes.io/proxy-buffering: "off"
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
              nginx.ingress.kubernetes.io/server-snippet: |
                charset utf-8;
                sendfile on;
                client_header_buffer_size 1k;
                large_client_header_buffers 4 8k;
              nginx.ingress.kubernetes.io/configuration-snippet: |
                add_header X-Content-Type-Options "nosniff";
                add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), battery=(), bluetooth=(), camera=(), clipboard-read=(), display-capture=(), document-domain=(), encrypted-media=(), gamepad=(), geolocation=(), gyroscope=(), hid=(), idle-detection=(), interest-cohort=(), keyboard-map=(), local-fonts=(), magnetometer=(), microphone=(), payment=(), publickey-credentials-get=(), serial=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;
                add_header Content-Security-Policy "default-src https: data: blob: ; img-src 'self' https://* ; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.youtube.com blob:; worker-src 'self' blob:; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; font-src 'self'";
                proxy_set_header X-TLS-Cipher $ssl_cipher;
                proxy_set_header X-TLS-Protocol $ssl_protocol;
                proxy_set_header X-TLS-SNI-Host $ssl_server_name;
                proxy_set_header X-Forwarded-Protocol $scheme;
                proxy_ignore_client_abort off;

          spec:
            ingressClassName: nginx-external
            tls:
              - hosts:
                  - jello.infra.slick.ge
                secretName: jellyfin-tls
            rules:
              - host: jello.infra.slick.ge
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: jellyfin-external
                          port:
                            number: 80

    ###########################################################################
    # Proxmox External Service + Endpoints
    ###########################################################################

    - name: Deploy Proxmox external Service
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: proxmox-external
            namespace: "{{ ingress_namespace }}"
          spec:
            sessionAffinity: ClientIP
            ports:
              - name: https
                port: 443
                targetPort: 8006

    - name: Deploy Proxmox external Endpoints
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: proxmox-external
            namespace: "{{ ingress_namespace }}"
          subsets:
            - addresses:
                - ip: 10.10.10.48
                - ip: 10.10.10.49
                - ip: 10.10.10.50
                - ip: 10.10.10.51
                - ip: 10.10.10.52
                - ip: 10.10.10.53
              ports:
                - name: https
                  port: 8006

    ###########################################################################
    # Proxmox Ingress (HTTPS backend)
    ###########################################################################

    - name: Deploy Proxmox ingress
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:

          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: proxmox
            namespace: "{{ ingress_namespace }}"
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
              nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
              nginx.ingress.kubernetes.io/proxy-body-size: "20m"
              nginx.ingress.kubernetes.io/proxy-request-buffering: "on"
              nginx.ingress.kubernetes.io/proxy-max-temp-file-size: "1024m"
              nginx.ingress.kubernetes.io/proxy-buffering: "on"
              nginx.ingress.kubernetes.io/proxy-hide-headers: "X-Powered-By"
              nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
              nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
              nginx.ingress.kubernetes.io/server-snippet: |
                charset utf-8;
                sendfile on;
                client_header_buffer_size 1k;
                large_client_header_buffers 4 8k;
              nginx.ingress.kubernetes.io/configuration-snippet: |
                proxy_set_header X-TLS-Cipher $ssl_cipher;
                proxy_set_header X-TLS-Protocol $ssl_protocol;
                proxy_set_header X-TLS-SNI-Host $ssl_server_name;
                proxy_set_header X-Forwarded-Protocol $scheme;
                proxy_ignore_client_abort off;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

          spec:
            ingressClassName: nginx-external
            tls:
              - hosts:
                  - proxmox.infra.slick.ge
                secretName: proxmox-tls
            rules:
              - host: proxmox.infra.slick.ge
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: proxmox-external
                          port:
                            number: 443