---
- name: Deploy ntfy with direct manifests
  hosts: localhost
  gather_facts: false
  connection: local
  become: false
  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
    kube_context: ""   # Set to your context if needed, else leave blank
    deployment_namespace: "ntfy"
    env_slug: "homelablocal"
    ntfy_ingress_host: "ntfy.infra.k8s.slick.ge"

  tasks:
    - name: Create ntfy namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ deployment_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Create PersistentVolumeClaim for ntfy data
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ntfy-data
            namespace: "{{ deployment_namespace }}"
            labels:
              app.kubernetes.io/name: ntfy
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: longhorn
            resources:
              requests:
                storage: 5Gi
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Deploy ntfy Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ntfy
            namespace: "{{ deployment_namespace }}"
            labels:
              app.kubernetes.io/name: ntfy
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: ntfy
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: ntfy
              spec:
                containers:
                  - name: ntfy
                    image: binwiederhier/ntfy:v2.11.0
                    imagePullPolicy: IfNotPresent
                    args:
                      - serve
                    ports:
                      - name: http
                        containerPort: 80
                        protocol: TCP
                    env:
                      - name: NTFY_BASE_URL
                        value: "https://{{ ntfy_ingress_host }}"
                      - name: NTFY_BEHIND_PROXY
                        value: "true"
                      - name: NTFY_CACHE_FILE
                        value: "/var/cache/ntfy/cache.db"
                      - name: NTFY_ATTACHMENT_CACHE_DIR
                        value: "/var/cache/ntfy/attachments"
                      - name: NTFY_ENABLE_METRICS
                        value: "true"
                    volumeMounts:
                      - name: ntfy-data
                        mountPath: /var/cache/ntfy
                    resources:
                      requests:
                        cpu: 50m
                        memory: 128Mi
                      limits:
                        cpu: 200m
                        memory: 256Mi
                    readinessProbe:
                      httpGet:
                        path: /v1/health
                        port: http
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 2
                      failureThreshold: 6
                    livenessProbe:
                      httpGet:
                        path: /v1/health
                        port: http
                      initialDelaySeconds: 30
                      periodSeconds: 20
                      timeoutSeconds: 2
                      failureThreshold: 3
                volumes:
                  - name: ntfy-data
                    persistentVolumeClaim:
                      claimName: ntfy-data
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Deploy ntfy Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: ntfy
            namespace: "{{ deployment_namespace }}"
            labels:
              app.kubernetes.io/name: ntfy
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: ntfy
            ports:
              - name: metrics
                port: 80
                targetPort: http
                protocol: TCP
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Deploy ntfy Ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ntfy
            namespace: "{{ deployment_namespace }}"
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              kubernetes.io/tls-acme: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - "{{ ntfy_ingress_host }}"
                secretName: ntfy-tls
            rules:
              - host: "{{ ntfy_ingress_host }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ntfy
                          port:
                            number: 80
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Create ServiceMonitor for ntfy metrics
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: ntfy-metrics
            namespace: "{{ deployment_namespace }}"
            labels:
              app.kubernetes.io/name: ntfy
              release: kube-prometheus-stack
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: ntfy
            endpoints:
              - port: metrics
                interval: 30s
                path: /metrics
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Wait for ntfy deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ deployment_namespace }}"
        name: ntfy
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: ntfy_deployment
      until: ntfy_deployment.resources[0].status.availableReplicas | default(0) >= 1
      retries: 30
      delay: 10

    - name: Display ntfy access information
      debug:
        msg:
          - "✅ ntfy deployed successfully!"
          - ""
          - "📊 Access Information:"
          - "  - Web UI: https://{{ ntfy_ingress_host }}"
          - "  - Internal Service: ntfy.{{ deployment_namespace }}.svc.cluster.local"
          - ""
          - "🔐 Authentication: anonymous publish/subscribe is enabled by default"
