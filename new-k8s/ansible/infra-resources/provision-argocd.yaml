
- name: Deploy ArgoCD with Helm
  hosts: localhost
  gather_facts: false
  connection: local
  become: false

  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
    kube_context: ""
    deployment_namespace: "argocd"
    argocd_release_name: "argocd"
    argocd_chart_ref: "argo/argo-cd"
    argocd_chart_version: ""  # pin if needed, e.g. 9.4.5
    argocd_wait_timeout: "900s"
    argocd_ingress_class: "nginx"
    argocd_ingress_host: "argocd.infra.k8s.slick.ge"
    argocd_tls_secret_name: "argocd-tls"
    argocd_server_insecure: true  # ingress terminates TLS; keep probes simple
    argocd_service_type: "ClusterIP"  # mirror upstream role patch step
    argocd_cli_install: false
    argocd_cli_url: "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-darwin-amd64"
    argocd_cli_path: "/usr/local/bin/argocd"

    # Infisical — must be preserved
    infisical_host_api: "https://infisical.infra.slick.ge/api"
    identity_id: "998c1306-87ff-4b1e-9225-2f82ef8d5fff"
    project_slug: "infra-resources-b-ou-q"
    env_slug: "homelablocal"
    secrets_path: "/argocd"

  tasks:
    - name: Ensure kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig }}"
      register: kubeconfig_stat

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - kubeconfig_stat.stat.exists
          - argocd_ingress_host | length > 0
        fail_msg: "kubeconfig must exist and argocd_ingress_host must be set"

    - name: Create ArgoCD namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ deployment_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Create InfisicalSecret for ArgoCD admin credentials
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: secrets.infisical.com/v1alpha1
          kind: InfisicalSecret
          metadata:
            name: argocd-secret
            namespace: "{{ deployment_namespace }}"
          spec:
            hostAPI: "{{ infisical_host_api }}"
            resyncInterval: 10
            authentication:
              kubernetesAuth:
                identityId: "{{ identity_id }}"
                serviceAccountRef:
                  name: infisical-service-account
                  namespace: infisical
                secretsScope:
                  envSlug: "{{ env_slug }}"
                  projectSlug: "{{ project_slug }}"
                  secretsPath: "{{ secrets_path }}"
            managedKubeSecretReferences:
              - secretName: argocd-secret
                secretNamespace: "{{ deployment_namespace }}"
                creationPolicy: Orphan
                template:
                  includeAllSecrets: false
                  data:
                    admin.password: "{{ '{{' }} .ARGOCD_ADMIN_PASSWORD_BCRYPT.Value {{ '}}' }}"
                    admin.passwordMtime: "{{ '{{' }} .ARGOCD_ADMIN_PASSWORD_MTIME.Value {{ '}}' }}"
                    server.secretkey: "{{ '{{' }} .ARGOCD_SERVER_SECRETKEY.Value {{ '}}' }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"

    - name: Wait for argocd-secret Secret to exist
      kubernetes.core.k8s_info:
        kind: Secret
        name: argocd-secret
        namespace: "{{ deployment_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: argocd_secret
      until: argocd_secret.resources | length > 0
      retries: 30
      delay: 10
      failed_when: argocd_secret.resources | length == 0

    - name: Verify ArgoCD secret was synced by Infisical
      kubernetes.core.k8s_info:
        kind: Secret
        name: argocd-secret
        namespace: "{{ deployment_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: argocd_secret_data
      until: argocd_secret_data.resources[0].data | default({}) | length >= 3
      retries: 30
      delay: 10
      failed_when: argocd_secret_data.resources[0].data | default({}) | length < 3

    - name: Ensure Argo Helm repo is present
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm

    - name: Build Helm values
      ansible.builtin.set_fact:
        argocd_values:
          installCRDs: true
          global:
            imagePullPolicy: IfNotPresent
          configs:
            secret:
              createSecret: false
            cm:
              url: "https://{{ argocd_ingress_host }}"
            params:
              "server.insecure": "{{ 'true' if argocd_server_insecure else 'false' }}"
          server:
            insecure: "{{ argocd_server_insecure }}"
            service:
              type: ClusterIP
              servicePortHttp: 80
              servicePortHttps: 443
            ingress:
              enabled: true
              ingressClassName: "{{ argocd_ingress_class }}"
              annotations:
                cert-manager.io/cluster-issuer: "letsencrypt-prod"
                kubernetes.io/tls-acme: "true"
                nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
              hosts:
                - "{{ argocd_ingress_host }}"
              paths:
                - /
              pathType: Prefix
              tls:
                - secretName: "{{ argocd_tls_secret_name }}"
                  hosts:
                    - "{{ argocd_ingress_host }}"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 1Gi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack
          controller:
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 2Gi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack
          repoServer:
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 2Gi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack
          applicationSet:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack
          dex:
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack
          redis:
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                additionalLabels:
                  release: kube-prometheus-stack

    - name: Deploy ArgoCD via Helm
      kubernetes.core.helm:
        name: "{{ argocd_release_name }}"
        chart_ref: "{{ argocd_chart_ref }}"
        chart_version: "{{ argocd_chart_version if argocd_chart_version else omit }}"
        release_namespace: "{{ deployment_namespace }}"
        create_namespace: true
        wait: true
        atomic: true
        wait_timeout: "{{ argocd_wait_timeout }}"
        values: "{{ argocd_values }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        update_repo_cache: true

    - name: Patch ArgoCD server service type (optional)
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: argocd-server
        namespace: "{{ deployment_namespace }}"
        definition:
          metadata:
            name: argocd-server
            namespace: "{{ deployment_namespace }}"
          spec:
            type: "{{ argocd_service_type }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      when: argocd_service_type | length > 0

    - name: Install ArgoCD CLI (optional)
      ansible.builtin.get_url:
        url: "{{ argocd_cli_url }}"
        dest: "{{ argocd_cli_path }}"
        mode: "0755"
      when: argocd_cli_install | bool

    - name: Wait for ArgoCD server deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ deployment_namespace }}"
        name: argocd-server
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: argocd_server_deploy
      until: argocd_server_deploy.resources[0].status.availableReplicas | default(0) >= 1
      retries: 60
      delay: 10

    - name: Verify ArgoCD server is responding
      ansible.builtin.uri:
        url: "https://{{ argocd_ingress_host }}"
        validate_certs: false
      retries: 10
      delay: 5

    - name: Display ArgoCD access information
      ansible.builtin.debug:
        msg:
          - "✅ ArgoCD deployed successfully!"
          - ""
          - "📊 Access Information:"
          - "  - Web UI: https://{{ argocd_ingress_host }}"
          - "  - Internal Service: argocd-server.{{ deployment_namespace }}.svc.cluster.local"
          - ""
          - "🔐 Credentials stored in secret: argocd-secret"
