---
- name: Deploy Kubernetes resources with Helm and kubectl
  hosts: localhost
  gather_facts: false
  connection: local
  become: false

  vars:
    kubeconfig: "~/.kube/config-k3s"
    kube_context: ""
    cloudflare_email: "ghvinerias@gmail.com"
    letsencrypt_email: "ghvineriaa@gmail.com"
    cloudflare_api_token: ""
    cert_issuer: "cloudflare-dns01"

  tasks:
    - name: Ensure ingress-nginx Helm repo is present
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx

    - name: Ensure cert-manager (jetstack) Helm repo is present
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io

    - name: Deploy ingress-nginx via Helm
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: true
        values:
          controller:
            allowSnippetAnnotations: true
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            kind: DaemonSet

            ingressClass: nginx-external
            ingressClassByName: true
            watchIngressWithoutClass: false

            ingressClassResource:
              name: nginx-external
              enabled: true
              default: false
              controllerValue: k8s.io/ingress-nginx

            publishService:
              enabled: true

            service:
              type: LoadBalancer

            admissionWebhooks:
              enabled: false

            tolerations:
              - key: "node-role.kubernetes.io/control-plane"
                operator: "Exists"
                effect: "NoSchedule"
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"

        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        wait: true
        atomic: true
        update_repo_cache: true

    - name: Deploy cert-manager via Helm (with CRDs)
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        set_values:
          - value: crds.enabled=true
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        wait: true
        atomic: true
        update_repo_cache: true

    - name: Wait for cert-manager CRDs to be available
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: clusterissuers.cert-manager.io
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: crd_info
      retries: 10
      delay: 10
      until: crd_info.resources | length > 0

    - name: Create Cloudflare API token Secret manually
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token-secret
            namespace: cert-manager
          type: Opaque
          stringData:
            api-token: "{{ cloudflare_api_token }}"
      when: cert_issuer == "cloudflare-dns01"

    - name: Apply ClusterIssuer YAML for HTTP01 challenge
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ letsencrypt_email }}"
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
                - http01:
                    ingress:
                      class: nginx-external
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      when: cert_issuer == "http01"

    - name: Apply ClusterIssuer YAML for Cloudflare DNS01 challenge
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ letsencrypt_email }}"
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
                - dns01:
                    cloudflare:
                      email: "{{ cloudflare_email }}"
                      apiTokenSecretRef:
                        name: cloudflare-api-token-secret
                        key: api-token
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      when: cert_issuer == "cloudflare-dns01"

