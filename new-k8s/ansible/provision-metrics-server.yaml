---
- name: Provision Kubernetes Metrics Server
  hosts: localhost
  gather_facts: false
  connection: local
  become: false
  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/.kube/config', true) }}"
    kube_context: ""
    metrics_server_release_name: "metrics-server"
    metrics_server_namespace: "kube-system"

  tasks:
    - name: Ensure Metrics Server Helm repo is present
      kubernetes.core.helm_repository:
        name: metrics-server
        repo_url: https://kubernetes-sigs.github.io/metrics-server/

    - name: Deploy Metrics Server via Helm
      kubernetes.core.helm:
        name: "{{ metrics_server_release_name }}"
        chart_ref: metrics-server/metrics-server
        release_namespace: "{{ metrics_server_namespace }}"
        create_namespace: false
        values:
          apiService:
            create: true
          args:
            - --kubelet-preferred-address-types=InternalIP,Hostname,InternalDNS,ExternalDNS,ExternalIP
            - --kubelet-insecure-tls
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 250m
              memory: 300Mi
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
        wait: true
        atomic: true
        update_repo_cache: true
        timeout: "5m0s"

    - name: Verify Metrics Server deployment is ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ metrics_server_release_name }}"
        namespace: "{{ metrics_server_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: metrics_server_status
      until: >-
        metrics_server_status.resources | length > 0 and
        (metrics_server_status.resources[0].status.readyReplicas | default(0)) >= 1
      retries: 12
      delay: 10

    - name: Verify metrics APIService registration exists
      kubernetes.core.k8s_info:
        api_version: apiregistration.k8s.io/v1
        kind: APIService
        name: v1beta1.metrics.k8s.io
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ kube_context if kube_context else omit }}"
      register: metrics_api_service
      until: metrics_api_service.resources | length > 0
      retries: 12
      delay: 5

    - name: Metrics Server deployment summary
      ansible.builtin.debug:
        msg: |
          Metrics Server deployed successfully!
            Release:   {{ metrics_server_release_name }}
            Namespace: {{ metrics_server_namespace }}
            Ready:     {{ metrics_server_status.resources[0].status.readyReplicas | default(0) }}
            APIService: v1beta1.metrics.k8s.io
